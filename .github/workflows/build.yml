
name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git python3-dev libffi-dev libssl-dev libsqlite3-dev zlib1g-dev openjdk-17-jdk zip unzip

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer Kivy

      - name: Build with Buildozer
        run: |
          buildozer init
          # Auto-accept all Android SDK licenses
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          echo "y" | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
